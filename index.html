---
layout: default
---

<div class="home">

  <img src="{{ site.baseurl }}/img/barnsley_fern.png" alt="Barnsley fern fractal" style="display:block;width:100%;max-width:600px;margin:0 auto 2rem;border-radius:4px;">

  <h1 class="post-title">Welcome!</h1>

  <h1 class="page-heading">Posts</h1>

  <ul class="post-list">
    {% for post in site.posts %}
      <li>
        <span class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</span>

        <h2>
          <a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
        </h2>
      </li>
    {% endfor %}
  </ul>

</div>
